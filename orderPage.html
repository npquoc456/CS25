<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Thu Ngân - CS24H</title>
    <style>
        /* ================= TỔNG THỂ ================= */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body { 
            background-color: #2c3338; 
            height: 100vh; 
            width: 100vw; 
            display: flex; 
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        /* ================= KHUNG POS CHÍNH ================= */
        .pos-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            
            width: 100vw;      
            height: 100vh;     
            max-width: none;   
            
            background-color: #eaf1f7;
            padding: 15px;
            border-radius: 0;  
        }
        
        /* ================= HEADER ================= */
        .header { 
            display: flex;
            flex-wrap: wrap; 
            justify-content: space-between;
            background-color: #0b5aa6; 
            color: white; 
            border-radius: 12px; 
            padding: 10px 20px; 
            align-items: center; 
            gap: 10px;
            margin-bottom: 1%;
        }

        .header-left { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            height: 50px; 
        }

        .logo-container { 
            height: 100%; 
            display: flex; 
            align-items: center; 
            background: white; 
            border-radius: 8px; 
            padding: 0 10px; 
        }

        .logo-container img { 
            max-height: 80%; 
            max-width: 120px; 
            object-fit: contain; 
        }

        .user-info { 
            display: flex; 
            flex-direction: column;
            line-height: 1.2; 
        }

        .user-info span:first-child { font-size: 0.8rem; opacity: 0.8; }
        .user-info span:last-child { font-weight: bold; font-size: 1rem; white-space: nowrap; }
        
        .header-right { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            flex-wrap: wrap;
        }

        .header-actions { 
            display: flex; 
            gap: 30%; 

        }

        .action-icon { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-size: 0.8rem; 
            cursor: pointer; 
            white-space: nowrap;

            margin-right: 20%;
        }

        .datetime { 
            font-weight: bold; 
            font-size: 1rem; 
            text-align: right; 
            white-space: nowrap;
        } 
        
        /* ================= KHU VỰC NỘI DUNG (MAIN) ================= */
        .main-container { 
            display: flex;
            flex-direction: column; 
            gap: 15px; 
            flex: 1;
            min-height: 0; 
            overflow-y: auto; 
        }
        
        /* --- PANEL TRÁI: HÓA ĐƠN --- */
        .invoice-panel { 
            display: flex;
            flex-direction: column;
            background: white; 
            border-radius: 15px; 
            padding: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            gap: 15px;
            flex: 1; 
            min-height: 350px; 
        }

        .table-responsive {
            flex: 1;
            overflow-x: auto; 
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid #ccc; 
            border-radius: 8px;
        }

        .invoice-table { 
            display: flex; 
            flex-direction: column;
            min-width: 500px; 
            flex: 1;
        }

        .grid-row { 
            display: grid; 
            grid-template-columns: 2fr 1fr 1fr 1fr 1.2fr; 
            align-items: center; 
            text-align: center; 
            padding: 10px; 
        }

        .grid-row > div:first-child { text-align: left; padding-left: 10px; }

        .table-header { 
            background-color: #0b5aa6; 
            color: white; 
            font-weight: bold; 
            font-size: 0.9rem; 
        }

        .table-body { 
            overflow-y: auto; 
            background: #fafafa; 
            flex: 1;
        }

        .table-row { 
            border-bottom: 1px solid #e0e0e0; 
            font-size: 0.9rem; 
            background: white;
        }
        
        .qty-control { display: flex; align-items: center; justify-content: center; gap: 5px; }
        .qty-btn { width: 25px; height: 25px; border: none; border-radius: 4px; background: #e0e0e0; cursor: pointer; font-weight: bold; }
        
        .summary-section { font-size: 1rem; padding-top: 10px; border-top: 2px dashed #eee; }
        .summary-row { display: grid; grid-template-columns: 1fr auto 40px; padding: 3px 0; font-weight: bold; align-items: end; }
        .summary-row .value { text-align: right; padding-right: 10px; }
        .summary-row .currency { text-align: right; }
        .total-row { border-top: 2px solid #333; font-size: 1.2rem; padding-top: 10px; margin-top: 5px; color: #d32f2f; }
        
        .invoice-actions { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 30px; 

             width: 70%;
             margin-left: 30%;
             margin-top: 5%;

        }
        .btn-action { padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; color: white; cursor: pointer; }
        .btn-cancel { background-color: #d32f2f; }
        .btn-pay { background-color: #0b5aa6; }
        
        /* --- PANEL PHẢI: SẢN PHẨM --- */
        .product-panel { 
            display: flex;
            flex-direction: column;
            background: white; 
            border-radius: 15px; 
            padding: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            gap: 15px;
            flex: 1;
            min-height: 400px;
        }
        
        .search-box { display: flex; gap: 10px; align-items: center; position: relative; }
        .search-box input { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 1rem; }
        #error-msg { position: absolute; bottom: -18px; left: 10px; color: #d32f2f; font-size: 0.8rem; font-weight: bold; display: none; }

        .category-filters { 
            display: flex; 
            justify-content: space-between; 
            gap: 10px; 
            overflow-x: auto; padding-bottom: 
            5px; white-space: nowrap; 
            margin-top: 10px;
        }
        .cat-btn { padding: 8px 15px; border: none; border-radius: 20px; background: #e0e0e0; cursor: pointer; font-size: 0.9rem; font-weight: bold; flex-shrink: 0; margin-left: 1%;}
        .cat-btn.active { background: #0b5aa6; color: white; }
        
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
            gap: 10px; 
            overflow-y: auto; 
            align-content: start; 
            padding: 5px; 
            flex: 1;
        }

        .product-card { aspect-ratio: 1 / 1.2; border: 1px solid #e0e4e8; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; cursor: pointer; background: #fdfdfd; transition: transform 0.1s, box-shadow 0.2s; }
        .product-card:hover { border-color: #0b5aa6; box-shadow: 0 5px 15px rgba(11, 90, 166, 0.2); }
        .product-card:active { transform: scale(0.95); }
        .product-img-container { flex: 1; padding: 5px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .product-img-container img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .product-name { text-align: center; font-size: 0.85rem; font-weight: bold; padding: 8px 5px; background: white; border-top: 1px solid #f0f0f0; pointer-events: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .product-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .product-actions button { padding: 12px; border-radius: 8px; border: none; font-weight: bold; font-size: 1rem; color: white; cursor: pointer; }
        .btn-detail { background-color: #9e9e9e; }
        .btn-add { background-color: #0b5aa6; }
        
        /* TÙY CHỈNH THANH CUỘN */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #bbb; border-radius: 5px; }

        /* ================= MEDIA QUERIES (TÙY CƠ ỨNG BIẾN) ================= */
        
        /* 1. Màn hình máy tính bảng (Tablet) & PC nhỏ (trên 768px) */
        @media (min-width: 768px) {
            .pos-wrapper {
                width: 100vw;   
                height: 100vh;  
                border-radius: 0; 
                padding: 20px;
            }
            .main-container {
                flex-direction: row; 
                overflow: hidden; 
            }
            .invoice-panel, .product-panel {
                min-height: 0; 
            }
        }

        /* 2. Màn hình PC chuẩn & lớn (trên 1024px) */
        @media (min-width: 1024px) {
            .pos-wrapper {
                width: 100vw;   
                height: 100vh;  
                padding: 25px;  
            }
            .main-container {
                display: grid; 
                grid-template-columns: 1.4fr 1fr; 
            }
            .product-grid { 
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
            }
            .product-card { aspect-ratio: 1 / 1; }
            .action-icon { font-size: 0.9rem; }
            .datetime { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="pos-wrapper">
        <header class="header">
            <div class="header-left">
                <div class="logo-container">
                    <img src="./img/logo.png" alt="CS24H Logo">
                </div>
                <div class="user-info" style="margin-left: 20px;">
                    <span>ID:  
                        <span id="ID"></span>
                    </span>
                    <span>Tên:
                        <span id="Name"></span>
                    </span>
                </div>
            </div>
            
            <div class="header-right">
                <div class="header-actions">
                    <div class="action-icon" id="btn-ketca" style="margin-right: 20px;">
                        <span>⏻</span>
                        <span>Kết ca</span>
                    </div>
                    <div class="action-icon" style="margin-right: 20px;" >
                        <span>⚙️</span>
                        <span>Hỗ trợ</span>
                    </div>
                </div>
                <div class="datetime" id="live-clock">Đang tải...</div>
            </div>
        </header>

        <main class="main-container">
            <div class="invoice-panel">
                <div class="table-responsive">
                    <div class="invoice-table">
                        <div class="grid-row table-header">
                            <div>ID - Tên SP</div>
                            <div>Đơn giá</div>
                            <div>Số Lượng</div>
                            <div>Giảm giá</div>
                            <div>Thành tiền</div>
                        </div>
                        <div class="table-body" id="invoice-list">
                        </div>
                    </div>
                </div>
                
                <div class="summary-section">
                    <div class="summary-row">
                        <div>TỔNG TIỀN</div>
                        <div class="value">0</div>
                        <div class="currency">VNĐ</div>
                    </div>
                    <div class="summary-row">
                        <div>GIẢM GIÁ</div>
                        <div class="value">0</div>
                        <div class="currency">VNĐ</div>
                    </div>
                    <div class="summary-row total-row">
                        <div>THÀNH TIỀN</div>
                        <div class="value" id="final-total">0</div>
                        <div class="currency">VNĐ</div>
                    </div>
                </div>
                
                <div class="invoice-actions">
                    <button class="btn-action btn-cancel" id="btn-clear">HỦY HÓA ĐƠN</button>
                    <button class="btn-action btn-pay">THANH TOÁN</button>
                </div>
            </div>

            <div class="product-panel">
                <div class="search-box">
                    <input type="text" id="barcode-scanner" placeholder="Nhập mã vạch vào đây..." autofocus>
                    <span>🔍</span>
                    <span id="error-msg">Sản phẩm không tồn tại!</span>
                </div>
                
                <div class="category-filters">
                    <button class="cat-btn active">Tất cả</button>
                    <button class="cat-btn">Tủ đông</button>
                    <button class="cat-btn">Nước uống</button>
                    <button class="cat-btn">Máy Hấp</button>
                    <button class="cat-btn">Đồ chiên</button>
                </div>

                <div class="product-grid" id="product-grid">
                </div>

                <div class="product-actions">
                    <button class="btn-detail">Chi tiết</button>
                    <button class="btn-add">Thêm</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            function updateDateTime() {
                const now = new Date();
                const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                const dayName = days[now.getDay()];
                const monthName = months[now.getMonth()];
                const dateNumber = now.getDate();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                const timeString = `${dayName} ${monthName} ${dateNumber} ${hours}:${minutes}:${seconds}`;
                document.getElementById('live-clock').textContent = timeString;
            }
            setInterval(updateDateTime, 1000); 
            updateDateTime();

            const productDatabase = {
                "123": { id: "123", name: "Tài lộc quá lớn", price: 10000, image: "./img/default.png" },
                "456": { id: "456", name: "Hamburger", price: 35000, image: "./img/default.png" },
                "789": { id: "789", name: "Coca Cola", price: 12000, image: "./img/default.png" },
                "101": { id: "101", name: "Nước suối", price: 5000, image: "./img/default.png" },
                "367": { id: "367", name: "Bú sục 5 chục", price: 50000, image: "./img/default.png" }
            };

            const productGrid = document.getElementById('product-grid');
            function renderProducts() {
                productGrid.innerHTML = '';
                Object.values(productDatabase).forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.dataset.id = product.id;
                    card.innerHTML = `
                        <div class="product-img-container"><img src="${product.image}" alt="${product.name}"></div>
                        <div class="product-name" title="${product.name}">${product.name}</div>
                    `;
                    productGrid.appendChild(card);
                });
            }
            renderProducts();

            const invoiceList = document.getElementById('invoice-list');
            const errorMsg = document.getElementById('error-msg');

            function updateCartTotal() {
                let total = 0;
                document.querySelectorAll('.table-row').forEach(row => {
                    total += parseInt(row.dataset.price) * parseInt(row.querySelector('.item-qty').textContent);
                });
                document.querySelector('.summary-section .summary-row:nth-child(1) .value').textContent = total.toLocaleString('vi-VN');
                document.getElementById('final-total').textContent = total.toLocaleString('vi-VN');
            }

            document.getElementById('btn-clear').addEventListener('click', function() {
                invoiceList.innerHTML = '';
                updateCartTotal();
            });

            function showCustomAlert(message) {
                errorMsg.textContent = message;
                errorMsg.style.display = 'block';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 2500);
            }

            function addToInvoice(productId) {
                const product = productDatabase[productId];
                if (!product) { 
                    showCustomAlert('Sản phẩm không có trong hệ thống!');
                    return; 
                }

                errorMsg.style.display = 'none';

                let existingRow = document.querySelector(`.table-row[data-id="${product.id}"]`);
                if (existingRow) {
                    existingRow.querySelector('.btn-plus').click();
                } else {
                    const newRow = document.createElement('div');
                    newRow.className = 'grid-row table-row';
                    newRow.dataset.id = product.id; 
                    newRow.dataset.price = product.price; 
                    newRow.innerHTML = `
                        <div>${product.id} - ${product.name}</div>
                        <div>${product.price.toLocaleString('vi-VN')}</div>
                        <div class="qty-control">
                            <button class="qty-btn btn-minus">-</button>
                            <span class="item-qty">1</span>
                            <button class="qty-btn btn-plus">+</button>
                        </div>
                        <div>0</div>
                        <div class="item-total">${product.price.toLocaleString('vi-VN')}</div>
                    `;
                    invoiceList.insertBefore(newRow, invoiceList.firstChild);
                    updateCartTotal(); 
                }
            }

            invoiceList.addEventListener('click', function(event) {
                if (event.target.classList.contains('qty-btn')) {
                    const btn = event.target;
                    const row = btn.closest('.table-row');
                    const qtySpan = row.querySelector('.item-qty');
                    let qty = parseInt(qtySpan.textContent);
                    const price = parseInt(row.dataset.price);

                    if (btn.classList.contains('btn-plus')) qty++;
                    else if (btn.classList.contains('btn-minus')) qty--;

                    if (qty <= 0) row.remove();
                    else {
                        qtySpan.textContent = qty;
                        row.querySelector('.item-total').textContent = (price * qty).toLocaleString('vi-VN');
                    }
                    updateCartTotal(); 
                }
            });

            const searchInput = document.getElementById('barcode-scanner');
            searchInput.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    const scannedCode = searchInput.value.trim();
                    if(scannedCode !== "") {
                        addToInvoice(scannedCode);
                        searchInput.value = ''; 
                    }
                }
            });

            productGrid.addEventListener('click', function(event) {
                const card = event.target.closest('.product-card');
                if (card && card.dataset.id) {
                    addToInvoice(card.dataset.id); 
                }
            });
        });

        //lay thong tin 
        function getinforid(){
            var id = app.getemployeeid(); 
            document.getElementById("ID").innerHTML = id; 
        }
        function getinforname(){
            var name = app.getemployeename()
            document.getElementById("Name").innerHTML = name; 
        }
    </script>
</body>
</html>
